<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
</head>
<body>
   <h2>To-Do List</h2>
    <input type="text" id="task"/>
    <button type="button" onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
    <button id="DeleteDone" onclick="deleteTask()">Delete</button>


<script>
function addTask(){
    let taskText = document.getElementById("task").value;

    let li = document.createElement("li");         // Create a new "li" element

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    li.appendChild(checkbox);                      // <li><input type="checkbox"> </li>

    let textNode = document.createTextNode(taskText);
    li.appendChild(textNode);

    document.getElementById("taskList").appendChild(li);

    document.getElementById("task").value = "";
}

function deleteTask(){
    let items = document.querySelectorAll("#taskList li");   // items = [task1, task2, task3]
    items.forEach(function(li){                     // Operationen auf jede li
        let checkbox = li.querySelector("input");
        if (checkbox.checked) {
            li.remove();
        }
    });
}
</script>
</body>
</html>
